[package]
name = "solana-keypair"
version = "3.1.2"
edition = "2021"
rust-version = "1.81.0"
authors = ["Anza Maintainers <maintainers@anza.xyz>"]
description = "Concrete implementation of a Solana `Signer`."
homepage = "https://anza.xyz/"
documentation = "https://docs.rs/solana-keypair"
license = "Apache-2.0"
repository = "https://github.com/anza-xyz/solana-sdk"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]
all-features = true
rustdoc-args = ["--cfg=docsrs"]

[lib]
name = "solana_keypair"
path = "src/lib.rs"

[features]
seed-derivable = [
  "dep:solana-derivation-path",
  "dep:solana-seed-derivable",
  "dep:ed25519-dalek-bip32",
]

[dependencies]
ed25519-dalek = { version = "2.1.1", features = ["rand_core"] }
ed25519-dalek-bip32 = { version = "0.3.0", optional = true }
five8 = "1.0.0"
five8_core = "1.0.0"
rand = "0.9.2"
solana-address = { version = "2.2.0", features = ["decode"] }
solana-derivation-path = { version = "3.0.0", optional = true }
solana-seed-derivable = { version = "3.0.0", optional = true }
solana-seed-phrase = "3.0.0"
solana-signature = { version = "3.3.0", default-features = false, features = ["std", "verify"] }
solana-signer = "3.0.0"

[dev-dependencies]
serde_json = "1.0.139"
static_assertions = "1.1.0"
tiny-bip39 = "2.0.0"
