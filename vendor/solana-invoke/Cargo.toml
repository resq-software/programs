[package]
name = "solana-invoke"
version = "0.5.0"
edition = "2021"
authors = [
  "Cavey Cool <caveycool@gmail.com>",
  "Magnetar Fields <0xMAGNETAR@proton.me>",
  "Jamie Hill-Daniel <jamie@osec.io",
]
license = "MIT OR Apache-2.0"
description = "Patched host-side CPI support for program-test."
repository = "https://github.com/solana-foundation/solana-invoke"

[lib]
name = "solana_invoke"
path = "src/lib.rs"

[dependencies]
solana-account-info = "3"
solana-define-syscall = "3"
solana-instruction = "3"
solana-program = "4"
solana-program-entrypoint = "3"
solana-stable-layout = "3"
